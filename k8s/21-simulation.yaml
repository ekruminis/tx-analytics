apiVersion: v1
kind: Service
metadata:
  name: simulation
  namespace: tx-analytics
spec:
  selector:
    app: simulation
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation
  namespace: tx-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulation
  template:
    metadata:
      labels:
        app: simulation
    spec:
      containers:
        - name: simulation
          image: tx-analytics/simulation:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: tx-config
            - secretRef:
                name: tx-secrets
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx320m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              memory: 450Mi
              cpu: 150m
