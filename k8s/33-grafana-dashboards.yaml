apiVersion: v1
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: tx-analytics
        orgId: 1
        folder: tx-analytics
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards
          foldersFromFilesStructure: false
  pipeline.json: |
    {
      "uid": "tx-analytics-pipeline",
      "title": "tx-analytics pipeline",
      "tags": ["tx-analytics"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Producer throughput (records/sec)",
          "description": "Kafka records published per second of real (wall-clock) time.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "suffix:rec/s", "custom": { "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(kafka_producer_record_send_total[1m]))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Kafka consumer lag by group (records)",
          "description": "Broker-side lag from kafka-exporter: records between each consumer group's committed offset and the head of the topic. Covers every group whether or not its consumer is alive. Groups that process more slowly visibly diverge.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (consumergroup, topic) (kafka_consumergroup_lag)",
              "legendFormat": "{{consumergroup}} / {{topic}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Kafka consumer lag, client-reported (records)",
          "description": "The same idea measured from inside each JVM by Micrometer. Kept alongside the broker view because it is the metric you get for free with Actuator — compare the two to see why the broker-side view is more trustworthy.",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "max by (service) (kafka_consumer_fetch_manager_records_lag_max)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Block mining time (p95, per TFM)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, tfm) (rate(simulation_block_mine_seconds_bucket[1m])))",
              "legendFormat": "{{tfm}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Blocks mined/sec (per TFM)",
          "description": "Simulation speed: blocks produced per second of real (wall-clock) time. NOT blockchain behaviour — each simulated block represents blockTime.intervalSeconds of chain time (600s by default), so 0.75 blocks/s means ~7.5 minutes of chain time simulated per real second.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "suffix:blocks/s", "custom": { "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (tfm) (rate(simulation_block_mine_seconds_count[1m]))",
              "legendFormat": "{{tfm}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "JVM heap used",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (service) (jvm_memory_used_bytes{area=\"heap\"})",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "query-api HTTP p95 latency",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, uri) (rate(http_server_requests_seconds_bucket{service=\"query-api\", uri!~\"/actuator.*\"}[1m])))",
              "legendFormat": "{{uri}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: tx-analytics
