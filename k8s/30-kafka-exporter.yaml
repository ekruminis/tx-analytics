apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: tx-analytics
spec:
  selector:
    app: kafka-exporter
  ports:
    - port: 9308
      targetPort: 9308
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: tx-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.7.0
          args: ["--kafka.server=kafka:29092"]
          ports:
            - containerPort: 9308
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
