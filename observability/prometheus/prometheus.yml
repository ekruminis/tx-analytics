global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
    metric_relabel_configs:
      - source_labels: [consumergroup]
        regex: "query-api-cache-.*"
        target_label: consumergroup
        replacement: "query-api-cache"

  - job_name: tx-analytics
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: query-api
      - targets: ["host.docker.internal:8081"]
        labels:
          service: producer
      - targets: ["host.docker.internal:8082"]
        labels:
          service: simulation
      - targets: ["host.docker.internal:8083"]
        labels:
          service: indexer
